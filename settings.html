<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AquaSight - Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <header>
    <div class="logo">AquaSight</div>
    <nav>
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="insights.html">Insights</a></li>
        <li><a href="tips.html">Tips</a></li>
        <li><a href="settings.html" class="active">Settings</a></li>
        <li><a href="index.html">Profile</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Settings / Profile</h1>

    <div class="card">
      <h2>Household Info</h2>
      <label>Number of Residents: 
        <input type="number" id="residents" min="1" value="3">
      </label>
      <label>Number of Appliances: 
        <input type="number" id="appliances" min="0" value="4">
      </label>
    </div>

    <div class="card">
      <h2>Units</h2>
      <label>Preferred Unit:  
        <select id="unit">
          <option value="liters">Liters</option>
          <option value="gallons">Gallons</option>
        </select>
      </label>
    </div>

    <div class="card">
      <h2>Notifications</h2>
      <label><input type="checkbox" id="ai-alerts" checked> AI Alerts (leaks, usage spikes)</label>
      <label><input type="checkbox" id="weekly-summary" checked> Weekly Summary</label>
    </div>

    <div class="card">
      <h2>Water Input Method</h2>
      <button id="connect-meter">Connect Smart Meter</button>
      <p>Or enter manual readings below:</p>
      <input type="number" id="manual-reading" placeholder="Enter daily usage">
      <button id="save-reading">Save</button>
    </div>
  </main>

  <script src="settings.js"></script>
</body>
</html>
